name: CI

on:
  # No paths filter on pull_request: this job is a required status check, so it
  # must report on every PR. A paths-filtered PR (docs-only, etc.) would never
  # start the run, leaving the required check permanently pending and the PR
  # unmergeable. The push trigger keeps its paths filter to save minutes.
  pull_request:
  push:
    branches: [master]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Examples/**"
      - "scripts/**"
      - "Package.swift"
      - ".swift-format"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

# Least privilege: this workflow only reads the repository. Narrowing the
# GITHUB_TOKEN here limits blast radius if a build step or action is compromised.
permissions:
  contents: read

jobs:
  build-test-docs:
    # Pinned: macos-latest can still resolve to macos-15 (default Xcode 16.4 /
    # Swift 6.1), which cannot parse this package's swift-tools-version 6.2.
    # macos-26 ships Xcode 26.x by default.
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache SwiftPM build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Sources/**/*.swift', 'Tests/**/*.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache DerivedData
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('Package.swift', 'Sources/**/*.swift', 'Tests/**/*.swift', 'Examples/**/*.swift') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Select available iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          devices_json="${RUNNER_TEMP}/available-simulators.json"
          xcrun simctl list devices available --json > "${devices_json}"
          selection="$(
            python3 - "${devices_json}" <<'PY'
          import json
          import re
          import sys

          with open(sys.argv[1], encoding="utf-8") as source:
              runtimes = json.load(source)["devices"]

          iphones = []
          for runtime_identifier, devices in runtimes.items():
              version_match = re.search(r"\.iOS-(\d+)-(\d+)(?:-(\d+))?$", runtime_identifier)
              if version_match is None:
                  continue

              version = tuple(int(component or 0) for component in version_match.groups())
              for position, device in enumerate(devices):
                  if not device.get("isAvailable", True) or not device["name"].startswith("iPhone"):
                      continue

                  model_match = re.fullmatch(r"iPhone (\d+)", device["name"])
                  generation = int(model_match.group(1)) if model_match is not None else None
                  iphones.append((version, -position, generation, device))

          if not iphones:
              raise SystemExit("No available iPhone simulator found")

          latest_runtime = max(candidate[0] for candidate in iphones)
          latest_iphones = [candidate for candidate in iphones if candidate[0] == latest_runtime]
          base_models = [candidate for candidate in latest_iphones if candidate[2] is not None]
          if base_models:
              selected = max(base_models, key=lambda candidate: (candidate[2], candidate[1]))[3]
          else:
              selected = max(latest_iphones, key=lambda candidate: candidate[1])[3]
          print(f"{selected['udid']}\t{selected['name']}")
          PY
          )"
          IFS=$'\t' read -r udid name <<< "${selection}"
          if [[ -z "${udid}" || -z "${name}" ]]; then
            echo "No available iPhone simulator found" >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "udid=${udid}" >> "${GITHUB_OUTPUT}"
          echo "Using simulator: ${name} (${udid})"

      - name: Swift format
        run: |
          swift format lint --configuration .swift-format \
            Package.swift \
            Sources/ScopedAnimation/*.swift \
            Sources/ScopedAnimation/Diagnostics/*.swift \
            Tests/ScopedAnimationTests/*.swift \
            Tests/ScopedAnimationTests/Support/*.swift \
            Examples/ScopedAnimationExample/ScopedAnimationExample/*.swift

      - name: Build package
        run: swift build

      - name: Test package on macOS
        run: swift test

      - name: Test package on iOS Simulator
        run: |
          xcodebuild test \
            -scheme ScopedAnimation \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath DerivedData \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Build package in release
        run: swift build -c release

      - name: Test package in release
        run: swift test -c release

      - name: Verify diagnostics compile out in release
        run: bash scripts/verify-release-diagnostics.sh

      - name: Build DocC documentation
        run: xcodebuild docbuild -scheme ScopedAnimation -destination 'generic/platform=iOS' -derivedDataPath DerivedData COMPILER_INDEX_STORE_ENABLE=NO

      - name: Build example app
        run: |
          xcodebuild build \
            -project Examples/ScopedAnimationExample/ScopedAnimationExample.xcodeproj \
            -scheme ScopedAnimationExample \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath DerivedData \
            COMPILER_INDEX_STORE_ENABLE=NO
